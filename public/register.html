<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartika J - Login Interface</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');

        body {
            font-family: "Montserrat", sans-serif;
            margin: 0px;
            background-color: rgb(243, 243, 243);
        }


        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            max-height: 100%;
            max-width: 100%;
        }

        form {
            background-color: white;
            width: 350px;
            height: 210px;
            max-width: 100%;
            max-height: 100%;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-shadow: 0 0 12px rgb(93, 93, 93);
        }

        legend {
            padding-top: 10px;
            padding-bottom: 10px;
            text-align: center;
        }

        label {
            margin-top: 8px;
            margin-left: 40px;

        }

        input[type="text"], input[type="email"],
        input[type="password"] {
            width: 270px;
            height: 20px;
            display: inline-block;
            margin-top: 1px;
        }

        button {
            width: 280px;
            height: 25px;
            margin-top: 10px;
            margin-bottom: 10px;
            margin-left: 40px;
            background-color: rgb(3, 155, 220);
            border: none;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container" >
        <form id="user-registrasi">
            <legend>Registrasi</legend>
            
            <label></label>
            <input type="text" name="name1" id="name" placeholder="Name" required />
            <br><br>
            <label></label>
            <input type="email" name="email" id="email" placeholder="Email" required />
            <br><br>
            <label></label>
            <input type="password" name="password" id="password" placeholder="Password" required />
            <button type="submit">Register</button>
        </form>
    </div>
    <script>
        document.getElementById("user-registrasi").addEventListener("submit", async (e) => {
        e.preventDefault();

        const response = await fetch("/register", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
            body: JSON.stringify({
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value
            })
        });

        const data = await response.json();

        alert(data.message);

        if(data.message === "Register Success"){
            window.location.href = "/login.html";
        }
        });
    </script>
</body>

</html>
